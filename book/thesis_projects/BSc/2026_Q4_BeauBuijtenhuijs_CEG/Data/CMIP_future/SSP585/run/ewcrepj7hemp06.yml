  description: Generic lumped forcing recipe
  authors:
  - unmaintained
  projects:
  - ewatercycle
datasets:
- dataset: MPI-ESM1-2-HR
  project: CMIP6
  ensemble: r1i1p1f1
  exp: ssp585
  mip: day
  grid: gn
  activity: ScenarioMIP
  institute: DKRZ
preprocessors:
