      shapefile: /home/beau/BEP-beau/BEP/code/CatchmentArea/CatchmentArea_4326.shp
      crop: true
      decomposed: false
    area_statistics:
      operator: mean
  rsds:
    extract_shape:
      shapefile: /home/beau/BEP-beau/BEP/code/CatchmentArea/CatchmentArea_4326.shp
      crop: true
      decomposed: false
    area_statistics:
      operator: mean
